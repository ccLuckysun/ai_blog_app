<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Details - AI Blog Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white">
        <div class="max-w-6xl mx-auto px-5 py-5 flex items-center justify-between">
            <h1 class="text-3xl font-bold">AI Blog Generator</h1>
            <a href="login.html" class="font-semibold hover:underline">Logout</a>
        </div>
    </header>

    <main class="flex-1 flex items-start justify-center px-5 pt-16 pb-10">
        <section class="w-full max-w-5xl bg-white rounded-lg shadow-md px-8 py-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Blog Post Details</h2>

            <article class="border border-gray-300 rounded-lg px-6 py-5">
                <h3 class="text-2xl font-bold text-gray-900 mb-2">Blog Post Title</h3>
                <p class="text-xl text-gray-800 leading-relaxed mb-6">This is the content</p>

                <hr class="border-gray-300 my-6">

                <h4 class="text-2xl font-bold text-gray-900 mb-2">Youtube Title</h4>
                <p class="text-xl text-gray-800 leading-relaxed mb-6">
                    Title of the associated youtube video
                </p>

                <h4 class="text-2xl font-bold text-gray-900 mb-2">Youtube Link</h4>
                <a href="https://www.youtube.com" class="text-xl text-blue-600 hover:underline">
                    https://www.youtube.com
                </a>
            </article>
        </section>
    </main>
</body>
</html>
