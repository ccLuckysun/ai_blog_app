<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Blog Generator</title>
    <link
        href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white">
        <div class="max-w-6xl mx-auto px-5 py-5 flex items-center justify-between">
            <h1 class="text-3xl font-bold">AI Blog Generator</h1>

            <!-- Public navigation before login. -->
            <nav class="font-semibold">
                <a href="{% url 'login' %}" class="hover:underline">Login</a>
                <a href="{% url 'signup' %}" class="hover:underline ml-3">Signup</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex items-start justify-center px-5 pt-24 pb-10">
        <section class="w-full max-w-5xl bg-white rounded-lg shadow-md px-8 py-8">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-900 mb-5">
                    Welcome to the AI Blog Generator
                </h2>
                <p class="max-w-3xl mx-auto text-gray-700 text-lg leading-relaxed">
                    Please log in or create an account before generating and managing blog articles.
                </p>
            </div>

            <div class="mt-8 flex justify-center gap-4">
                <a
                    href="{% url 'login' %}"
                    class="bg-blue-600 text-white text-lg font-medium px-6 py-3 rounded shadow hover:bg-blue-700 active:bg-blue-800"
                >
                    Login
                </a>
                <a
                    href="{% url 'signup' %}"
                    class="bg-gray-200 text-gray-900 text-lg font-medium px-6 py-3 rounded shadow hover:bg-gray-300 active:bg-gray-400"
                >
                    Signup
                </a>
            </div>
        </section>
    </main>
</body>
</html>
