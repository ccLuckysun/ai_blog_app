<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - AI Blog Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white">
        <div class="max-w-6xl mx-auto px-5 py-5 flex items-center justify-between">
            <h1 class="text-3xl font-bold">AI Blog Generator</h1>
            <nav class="font-semibold">
                <a href="login.html" class="hover:underline">Login</a>
                <a href="signup.html" class="hover:underline ml-1">Signup</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex items-start justify-center px-5 pt-10 pb-10">
        <section class="w-full max-w-lg bg-white rounded-lg shadow-md px-8 py-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Signup</h2>

            <form>
                <div class="mb-5">
                    <label for="username" class="block text-lg font-bold text-gray-900 mb-2">Username</label>
                    <input
                        id="username"
                        type="text"
                        placeholder="Enter your username..."
                        class="w-full border border-gray-300 rounded px-4 py-3 text-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-5">
                    <label for="email" class="block text-lg font-bold text-gray-900 mb-2">Email</label>
                    <input
                        id="email"
                        type="email"
                        placeholder="Enter your email..."
                        class="w-full border border-gray-300 rounded px-4 py-3 text-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-5">
                    <label for="password" class="block text-lg font-bold text-gray-900 mb-2">Password</label>
                    <input
                        id="password"
                        type="password"
                        placeholder="Enter your password..."
                        class="w-full border border-gray-300 rounded px-4 py-3 text-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <div class="mb-5">
                    <label for="confirm-password" class="block text-lg font-bold text-gray-900 mb-2">Confirm Password</label>
                    <input
                        id="confirm-password"
                        type="password"
                        placeholder="Confirm your password..."
                        class="w-full border border-gray-300 rounded px-4 py-3 text-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white text-lg font-medium px-6 py-3 rounded shadow hover:bg-blue-700 active:bg-blue-800">
                    Signup
                </button>
            </form>
        </section>
    </main>
</body>
</html>
